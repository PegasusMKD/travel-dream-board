with-expecter: true
dir: "mocks"
all: true
recursive: true
keeptree: false
# Address deprecation warnings for v3 compatibility
resolve-type-alias: false
disable-version-string: true
issue-845-fix: true

packages:
  github.com/PegasusMKD/travel-dream-board:
    config:
      recursive: true
      all: true
      with-expecter: true
      dir: "mocks"
      outpkg: mocks
      mockname: "Mock{{.PackageName}}{{.InterfaceName}}"
      filename: "{{.PackageName}}_{{.InterfaceName}}.go"
      exclude:
        - "internal/db"
